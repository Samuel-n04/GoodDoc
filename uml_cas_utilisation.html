<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diagramme de Cas d'Utilisation — RDV Médicaux</title>
<style>
  body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
  h1 { text-align:center; color:#2c3e50; margin-bottom:10px; }
</style>
</head>
<body>
<h1>Diagramme de Cas d'Utilisation — Système de Gestion de RDV Médicaux</h1>
<svg viewBox="0 0 1100 780" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Système border -->
  <rect x="220" y="40" width="680" height="700" rx="10" fill="white" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="560" y="65" text-anchor="middle" font-size="16" font-weight="bold" fill="#475569" font-family="Segoe UI">Système de Gestion de RDV Médicaux</text>

  <!-- ===== ACTEURS ===== -->
  <!-- Patient -->
  <ellipse cx="90" cy="200" rx="22" ry="22" fill="none" stroke="#16a34a" stroke-width="2"/>
  <line x1="90" y1="222" x2="90" y2="270" stroke="#16a34a" stroke-width="2"/>
  <line x1="60" y1="240" x2="120" y2="240" stroke="#16a34a" stroke-width="2"/>
  <line x1="90" y1="270" x2="65" y2="300" stroke="#16a34a" stroke-width="2"/>
  <line x1="90" y1="270" x2="115" y2="300" stroke="#16a34a" stroke-width="2"/>
  <text x="90" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a" font-family="Segoe UI">Patient</text>

  <!-- Médecin -->
  <ellipse cx="90" cy="520" rx="22" ry="22" fill="none" stroke="#ca8a04" stroke-width="2"/>
  <line x1="90" y1="542" x2="90" y2="590" stroke="#ca8a04" stroke-width="2"/>
  <line x1="60" y1="560" x2="120" y2="560" stroke="#ca8a04" stroke-width="2"/>
  <line x1="90" y1="590" x2="65" y2="620" stroke="#ca8a04" stroke-width="2"/>
  <line x1="90" y1="590" x2="115" y2="620" stroke="#ca8a04" stroke-width="2"/>
  <text x="90" y="638" text-anchor="middle" font-size="13" font-weight="bold" fill="#ca8a04" font-family="Segoe UI">Médecin</text>

  <!-- Système (acteur externe) -->
  <ellipse cx="1020" cy="400" rx="22" ry="22" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <line x1="1020" y1="422" x2="1020" y2="470" stroke="#7c3aed" stroke-width="2"/>
  <line x1="990" y1="440" x2="1050" y2="440" stroke="#7c3aed" stroke-width="2"/>
  <line x1="1020" y1="470" x2="995" y2="500" stroke="#7c3aed" stroke-width="2"/>
  <line x1="1020" y1="470" x2="1045" y2="500" stroke="#7c3aed" stroke-width="2"/>
  <text x="1020" y="518" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed" font-family="Segoe UI">Système</text>
  <text x="1020" y="532" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed" font-family="Segoe UI">Notif.</text>

  <!-- ===== CAS D'UTILISATION ===== -->
  <!-- Communs -->
  <ellipse cx="400" cy="105" rx="120" ry="25" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="110" text-anchor="middle" font-size="12" fill="#1e293b" font-family="Segoe UI">S'inscrire / Se connecter</text>

  <!-- Patient UC -->
  <ellipse cx="400" cy="185" rx="110" ry="25" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="400" y="190" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Prendre un rendez-vous</text>

  <ellipse cx="400" cy="250" rx="110" ry="25" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="400" y="255" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Annuler un rendez-vous</text>

  <ellipse cx="400" cy="315" rx="110" ry="25" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="400" y="320" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Consulter son dossier médical</text>

  <ellipse cx="400" cy="380" rx="110" ry="25" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Rejoindre une consultation vidéo</text>

  <ellipse cx="400" cy="445" rx="110" ry="25" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="400" y="450" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Voir ses ordonnances</text>

  <!-- Médecin UC -->
  <ellipse cx="670" cy="185" rx="110" ry="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="670" y="190" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Gérer ses disponibilités</text>

  <ellipse cx="670" cy="250" rx="110" ry="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="670" y="255" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Valider / Refuser un RDV</text>

  <ellipse cx="670" cy="315" rx="110" ry="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="670" y="320" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Démarrer consultation vidéo</text>

  <ellipse cx="670" cy="380" rx="110" ry="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="670" y="385" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Rédiger une ordonnance</text>

  <ellipse cx="670" cy="445" rx="110" ry="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="670" y="450" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Consulter dossier patient</text>

  <ellipse cx="670" cy="510" rx="110" ry="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="670" y="515" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Gérer prescriptions</text>

  <!-- Système notif UC -->
  <ellipse cx="535" cy="590" rx="130" ry="25" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="535" y="595" text-anchor="middle" font-size="12" fill="#3b0764" font-family="Segoe UI">Envoyer rappel / notification</text>

  <ellipse cx="535" cy="655" rx="130" ry="25" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="535" y="660" text-anchor="middle" font-size="12" fill="#3b0764" font-family="Segoe UI">Générer lien de consultation</text>

  <!-- ===== ASSOCIATIONS ===== -->
  <!-- Patient -> Commun -->
  <line x1="112" y1="190" x2="280" y2="105" stroke="#16a34a" stroke-width="1.2"/>
  <!-- Patient -> ses UC -->
  <line x1="112" y1="200" x2="290" y2="185" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="112" y1="210" x2="290" y2="250" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="112" y1="220" x2="290" y2="315" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="112" y1="230" x2="290" y2="380" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="112" y1="240" x2="290" y2="445" stroke="#16a34a" stroke-width="1.2"/>

  <!-- Medecin -> Commun -->
  <line x1="112" y1="510" x2="280" y2="105" stroke="#ca8a04" stroke-width="1.2"/>
  <!-- Medecin -> ses UC -->
  <line x1="112" y1="520" x2="560" y2="185" stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="112" y1="530" x2="560" y2="250" stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="112" y1="540" x2="560" y2="315" stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="112" y1="550" x2="560" y2="380" stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="112" y1="560" x2="560" y2="445" stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="112" y1="570" x2="560" y2="510" stroke="#ca8a04" stroke-width="1.2"/>

  <!-- Système notif -> ses UC -->
  <line x1="998" y1="410" x2="665" y2="590" stroke="#7c3aed" stroke-width="1.2"/>
  <line x1="998" y1="420" x2="665" y2="655" stroke="#7c3aed" stroke-width="1.2"/>

  <!-- include / extend -->
  <line x1="400" y1="185" x2="400" y2="165" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="412" y="178" font-size="10" fill="#2563eb" font-family="Segoe UI">«include»</text>

  <line x1="670" y1="315" x2="670" y2="275" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="682" y="298" font-size="10" fill="#2563eb" font-family="Segoe UI">«include»</text>

  <!-- Légende -->
  <rect x="230" y="700" width="530" height="30" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <line x1="260" y1="715" x2="300" y2="715" stroke="#555" stroke-width="1.5"/>
  <text x="310" y="720" font-size="11" fill="#333" font-family="Segoe UI">Association</text>
  <line x1="400" y1="715" x2="440" y2="715" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="450" y="720" font-size="11" fill="#2563eb" font-family="Segoe UI">«include» / «extend»</text>
</svg>
</body>
</html>
