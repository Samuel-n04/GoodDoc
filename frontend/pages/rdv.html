<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GooDoc — Mes rendez-vous</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="navbar-brand">🩺 GooDoc</div>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">Accueil</a>
      <a href="rdv.html" class="nav-link active">Mes RDV</a>
      <a href="dossier.html" class="nav-link">Dossier médical</a>
      <a href="medecins.html" class="nav-link">Médecins</a>
    </div>
    <div class="navbar-user">
      <span id="user-name"></span>
      <button class="btn-logout" onclick="deconnexion()">Déconnexion</button>
    </div>
  </nav>

  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h1 class="page-title" style="margin:0">Mes rendez-vous</h1>
      <button class="btn-primary" id="btn-nouveau" onclick="ouvrirModal()">+ Nouveau RDV</button>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Heure</th>
            <th>Médecin</th>
            <th>Spécialité</th>
            <th>Motif</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody-rdv">
          <tr>
            <td colspan="7" style="text-align:center;color:var(--muted)">Chargement...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal nouveau RDV -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Prendre un rendez-vous</h2>
      <div class="form-group">
        <label>Médecin</label>
        <select id="select-medecin" onchange="chargerCreneaux(this.value)">
          <option value="">-- Choisir un médecin --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Créneau disponible</label>
        <select id="select-creneau">
          <option value="">-- Sélectionner un médecin d'abord --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Motif de consultation</label>
        <input type="text" id="input-motif" placeholder="Consultation générale, suivi...">
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="fermerModal()">Annuler</button>
        <button class="btn-primary" onclick="confirmerRDV()">Confirmer</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/rdv.js"></script>
</body>

</html>
