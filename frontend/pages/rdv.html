<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GooDoc — Mes rendez-vous</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="navbar-brand">🩺 GooDoc</div>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">Accueil</a>
      <a href="rdv.html" class="nav-link active">Mes RDV</a>
      <a href="dossier.html" class="nav-link">Dossier médical</a>
      <a href="medecins.html" class="nav-link">Médecins</a>
    </div>
    <div class="navbar-user">
      <span id="user-name"></span>
      <button class="btn-logout" onclick="deconnexion()">Déconnexion</button>
    </div>
  </nav>

  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h1 class="page-title" style="margin:0">Mes rendez-vous</h1>
      <button class="btn-primary" id="btn-nouveau" onclick="ouvrirModal()">+ Nouveau RDV</button>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Médecin</th>
            <th>Spécialité</th>
            <th>Motif</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody-rdv">
          <tr>
            <td colspan="6" style="text-align:center;color:var(--muted)">Chargement...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal nouveau RDV -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Prendre un rendez-vous</h2>
      <div class="form-group">
        <label>Médecin</label>
        <select id="select-medecin" onchange="chargerCreneaux(this.value)">
          <option value="">-- Choisir un médecin --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="input-date" min="">
      </div>
      <div class="form-group">
        <label>Créneau disponible</label>
        <select id="select-creneau">
          <option value="">-- Sélectionner un médecin d'abord --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Motif de consultation</label>
        <input type="text" id="input-motif" placeholder="Consultation générale, suivi...">
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="fermerModal()">Annuler</button>
        <button class="btn-primary" onclick="confirmerRDV()">Confirmer</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const session = JSON.parse(localStorage.getItem('goodoc_session') || '{}');
    if (!session.user_id) window.location.href = '../login.php';

    document.getElementById('user-name').textContent = `${session.prenom} ${session.nom}`;

    // Date min = aujourd'hui
    document.getElementById('input-date').min = new Date().toISOString().split('T')[0];

    const badges = {
      EN_ATTENTE: 'badge-attente', CONFIRME: 'badge-confirme',
      ANNULE: 'badge-annule', TERMINE: 'badge-termine'
    };

    async function chargerRDV() {
      const rdvs = await api.get(`/rdv/patient/${session.patient_id}`);
      const tbody = document.getElementById('tbody-rdv');
      if (!rdvs.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted)">Aucun rendez-vous</td></tr>';
        return;
      }
      tbody.innerHTML = rdvs.map(r => `
      <tr>
        <td>${new Date(r.date).toLocaleDateString('fr-FR')}</td>
        <td>Dr. ${r.medecin_prenom} ${r.medecin_nom}</td>
        <td>${r.specialite || '—'}</td>
        <td>${r.motif || '—'}</td>
        <td><span class="badge ${badges[r.statut]}">${r.statut}</span></td>
        <td style="display:flex;gap:6px">
          ${r.statut === 'CONFIRME' ? `<button class="btn-primary btn-sm" onclick="rejoindre(${r.id})">Rejoindre</button>` : ''}
          ${r.statut === 'EN_ATTENTE' ? `<button class="btn-danger btn-sm" onclick="annuler(${r.id})">Annuler</button>` : ''}
        </td>
      </tr>
    `).join('');
    }

    async function ouvrirModal() {
      document.getElementById('modal').classList.add('open');
      const medecins = await api.get('/medecins');
      const sel = document.getElementById('select-medecin');
      sel.innerHTML = '<option value="">-- Choisir un médecin --</option>' +
        medecins.map(m => `<option value="${m.id}">Dr. ${m.prenom} ${m.nom} — ${m.specialite}</option>`).join('');
    }

    function fermerModal() {
      document.getElementById('modal').classList.remove('open');
    }

    async function chargerCreneaux(medecinId) {
      if (!medecinId) return;
      const creneaux = await api.get(`/medecins/${medecinId}/creneaux`);
      const sel = document.getElementById('select-creneau');
      sel.innerHTML = creneaux.length
        ? creneaux.map(c => `<option value="${c.id}">${c.heure_debut} — ${c.heure_fin}</option>`).join('')
        : '<option>Aucun créneau disponible</option>';
    }

    async function confirmerRDV() {
      const data = {
        patient_id: session.patient_id,
        medecin_id: parseInt(document.getElementById('select-medecin').value),
        creneau_id: parseInt(document.getElementById('select-creneau').value),
        date: document.getElementById('input-date').value,
        motif: document.getElementById('input-motif').value
      };
      if (!data.medecin_id || !data.date) return alert('Veuillez remplir tous les champs.');
      await api.post('/rdv', data);
      fermerModal();
      chargerRDV();
    }

    async function annuler(id) {
      if (!confirm('Confirmer l\'annulation ?')) return;
      await api.delete(`/rdv/${id}`);
      chargerRDV();
    }

    async function rejoindre(rdvId) {
      const c = await api.get(`/consultation/rdv/${rdvId}`);
      if (c?.url_video) window.open(c.url_video, '_blank');
      else alert('Lien non disponible.');
    }

    function deconnexion() {
      window.location.href = '../logout.php';
    }

    chargerRDV();
  </script>
</body>

</html>
