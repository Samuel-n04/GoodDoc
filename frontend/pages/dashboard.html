<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GooDoc — Tableau de bord</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <nav class="navbar">
    <div class="navbar-brand">🩺 GooDoc</div>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link active">Accueil</a>
      <a href="rdv.html" class="nav-link">Mes RDV</a>
      <a href="dossier.html" class="nav-link">Dossier médical</a>
      <a href="medecins.html" class="nav-link" id="lien-medecins">Médecins</a>
    </div>
    <div class="navbar-user">
      <span id="user-name">Chargement...</span>
      <button class="btn-logout" onclick="deconnexion()">Déconnexion</button>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title" id="titre-page">Bonjour 👋</h1>

    <!-- Stats -->
    <div class="grid-4" style="margin-bottom:28px">
      <div class="stat-card">
        <div class="stat-value" id="nb-rdv">—</div>
        <div class="stat-label">Rendez-vous à venir</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="nb-confirme">—</div>
        <div class="stat-label">RDV confirmés</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="nb-notifs">—</div>
        <div class="stat-label">Notifications non lues</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="nb-ordonnances">—</div>
        <div class="stat-label">Ordonnances</div>
      </div>
    </div>

    <!-- Prochains RDV -->
    <div class="card">
      <div class="card-title">Prochains rendez-vous</div>
      <table class="table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Médecin / Patient</th>
            <th>Motif</th>
            <th>Statut</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tbody-rdv">
          <tr>
            <td colspan="5" style="text-align:center;color:var(--muted)">Chargement...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/dashboard.js"></script>
</body>

</html>
