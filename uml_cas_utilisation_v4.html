<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>GooDoc — Diagramme de Cas d'Utilisation</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f9f7f4;
      font-family: 'DM Sans', sans-serif;
      padding: 32px;
    }

    header {
      margin-bottom: 28px;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #1a1a1a;
      max-width: 500px;
      line-height: 1.25;
    }

    header .meta {
      font-size: 10px;
      font-weight: 500;
      color: #6b6b6b;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-align: right;
      line-height: 1.9;
    }

    svg text {
      font-family: 'DM Sans', sans-serif;
    }

    .legend {
      margin-top: 24px;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      padding: 14px 20px;
      background: #fff;
      border: 1px solid #e2e2e2;
      border-radius: 10px;
      font-size: 11px;
      color: #444;
      font-family: 'DM Mono', monospace;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .leg-line {
      width: 32px;
      height: 2px;
    }

    .leg-solid {
      background: #555;
    }

    .leg-dash {
      background: repeating-linear-gradient(90deg, #2563eb 0, #2563eb 5px, transparent 5px, transparent 8px);
      height: 1.5px;
    }

    .leg-dash-gray {
      background: repeating-linear-gradient(90deg, #888 0, #888 4px, transparent 4px, transparent 7px);
      height: 1.5px;
    }
  </style>
</head>

<body>

  <header>
    <h1>GooDoc — Diagramme de cas d'utilisation</h1>
    <div class="meta">Licence Informatique · Institut Galilée</div>
  </header>

  <!--
  LAYOUT (deux sections indépendantes, empilées verticalement) :

  SECTION PATIENT (y 60..740)
  ┌─────────────────────────────────────────────────────────────────────┐
  │  acteur(cx=70)  se-connecter(cx=260,cy=390)  cas(cx=520)  sous-cas(cx=780) │
  └─────────────────────────────────────────────────────────────────────┘

  SECTION MÉDECIN (y 780..1460)
  ┌─────────────────────────────────────────────────────────────────────┐
  │  acteur(cx=70)  se-connecter(cx=260,cy=1120) cas(cx=520) sous-cas(cx=780) │
  └─────────────────────────────────────────────────────────────────────┘

  Cas patient : cy = 200, 300, 400, 500, 600, 700  (pas 100)
  Cas médecin : cy = 860, 960, 1060, 1160, 1260, 1360  (pas 100)
  Se connecter Patient cy=390  (milieu de 200..700 = 450 → ~390 pour laisser espace)
  Se connecter Médecin cy=1120 (milieu de 860..1360)
-->

  <svg viewBox="0 0 1100 1500" xmlns="http://www.w3.org/2000/svg" width="100%">
    <defs>
      <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#2563eb" />
      </marker>
      <marker id="arrGray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#888" />
      </marker>
    </defs>

    <!-- ═══════════════════════════════════════════════════════════
     BORDURE SYSTÈME
═══════════════════════════════════════════════════════════ -->
    <rect x="150" y="30" width="930" height="1440" rx="14" fill="white" stroke="#94a3b8" stroke-width="1.5"
      stroke-dasharray="10,5" />
    <text x="615" y="55" text-anchor="middle" font-size="13" font-weight="500" fill="#475569">GooDoc — Système de
      Gestion de RDV Médicaux</text>

    <!-- Séparateur Patient / Médecin -->
    <line x1="158" y1="760" x2="1072" y2="760" stroke="#e2e2e2" stroke-width="1.5" stroke-dasharray="8,4" />
    <text x="162" y="752" font-size="9" fill="#94a3b8" font-family="'DM Mono',sans-serif">PATIENT</text>
    <text x="162" y="775" font-size="9" fill="#94a3b8" font-family="'DM Mono',sans-serif">MÉDECIN</text>

    <!-- ═══════════════════════════════════════════════════════════
     ██ SECTION PATIENT
═══════════════════════════════════════════════════════════ -->

    <!-- Acteur Patient cx=70, cy=420 (milieu section patient) -->
    <ellipse cx="70" cy="395" rx="20" ry="20" fill="none" stroke="#16a34a" stroke-width="2" />
    <line x1="70" y1="415" x2="70" y2="455" stroke="#16a34a" stroke-width="2" />
    <line x1="46" y1="433" x2="94" y2="433" stroke="#16a34a" stroke-width="2" />
    <line x1="70" y1="455" x2="50" y2="480" stroke="#16a34a" stroke-width="2" />
    <line x1="70" y1="455" x2="90" y2="480" stroke="#16a34a" stroke-width="2" />
    <text x="70" y="498" text-anchor="middle" font-size="13" font-weight="500" fill="#16a34a">Patient</text>

    <!-- Se connecter Patient  cx=265, cy=420 -->
    <ellipse cx="265" cy="420" rx="105" ry="26" fill="#f1f5f9" stroke="#475569" stroke-width="1.5" />
    <text x="265" y="425" text-anchor="middle" font-size="11" fill="#1e293b">S'inscrire / Se connecter</text>

    <!-- Ligne acteur → se connecter -->
    <line x1="90" y1="415" x2="160" y2="420" stroke="#16a34a" stroke-width="1.2" />

    <!-- CAS PATIENT  cx=530, cy= 200..700 pas=100 -->
    <!-- P1 -->
    <ellipse cx="530" cy="200" rx="130" ry="26" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" />
    <text x="530" y="205" text-anchor="middle" font-size="12" fill="#14532d">Prendre un rendez-vous</text>
    <!-- P2 -->
    <ellipse cx="530" cy="300" rx="130" ry="26" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" />
    <text x="530" y="305" text-anchor="middle" font-size="12" fill="#14532d">Annuler un rendez-vous</text>
    <!-- P3 -->
    <ellipse cx="530" cy="400" rx="130" ry="26" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" />
    <text x="530" y="405" text-anchor="middle" font-size="12" fill="#14532d">Consulter son dossier médical</text>
    <!-- P4 -->
    <ellipse cx="530" cy="500" rx="130" ry="26" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" />
    <text x="530" y="505" text-anchor="middle" font-size="12" fill="#14532d">Rejoindre consultation vidéo</text>
    <!-- P5 -->
    <ellipse cx="530" cy="600" rx="130" ry="26" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" />
    <text x="530" y="605" text-anchor="middle" font-size="12" fill="#14532d">Recevoir une notification</text>
    <!-- P6 -->
    <ellipse cx="530" cy="700" rx="130" ry="26" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" />
    <text x="530" y="705" text-anchor="middle" font-size="12" fill="#14532d">Voir ses ordonnances</text>

    <!-- include: Se connecter → chaque cas patient -->
    <line x1="370" y1="412" x2="400" y2="200" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="416" x2="400" y2="300" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="420" x2="400" y2="400" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="424" x2="400" y2="500" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="428" x2="400" y2="600" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="432" x2="400" y2="700" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <text x="378" y="340" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

    <!-- SOUS-CAS PATIENT  cx=840 -->
    <!-- Sous P1a : Choisir médecin cy=160 -->
    <ellipse cx="840" cy="160" rx="108" ry="22" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
    <text x="840" y="165" text-anchor="middle" font-size="11" fill="#166534">Choisir un médecin</text>
    <!-- Sous P1b : Choisir créneau cy=220 -->
    <ellipse cx="840" cy="220" rx="108" ry="22" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
    <text x="840" y="225" text-anchor="middle" font-size="11" fill="#166534">Choisir un créneau</text>
    <!-- Sous P1c : Confirmer RDV cy=280 -->
    <ellipse cx="840" cy="280" rx="108" ry="22" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
    <text x="840" y="285" text-anchor="middle" font-size="11" fill="#166534">Confirmer le RDV</text>
    <!-- Sous P3a : Voir historique cy=380 -->
    <ellipse cx="840" cy="380" rx="108" ry="22" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
    <text x="840" y="385" text-anchor="middle" font-size="11" fill="#166534">Voir l'historique des consultations</text>

    <!-- include: Prendre RDV → sous-cas -->
    <line x1="660" y1="192" x2="732" y2="168" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <text x="672" y="175" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>
    <line x1="660" y1="200" x2="732" y2="220" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="660" y1="208" x2="732" y2="278" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />

    <!-- include: Consulter dossier → sous-cas -->
    <line x1="660" y1="395" x2="732" y2="382" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <text x="672" y="391" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

    <!-- extend: Annuler RDV → Notif (flèche vers la droite longeant le bord) -->
    <path d="M660,300 L1060,300 L1060,1320 L940,1320" stroke="#888" stroke-width="1" stroke-dasharray="5,3" fill="none"
      marker-end="url(#arrGray)" />
    <text x="1062" y="810" font-size="9" fill="#888" font-family="'DM Mono',sans-serif">«extend»</text>

    <!-- extend: Confirmer RDV → Notif -->
    <path d="M732,280 L1050,280 L1050,1320" stroke="#888" stroke-width="1" stroke-dasharray="5,3" fill="none"
      marker-end="url(#arrGray)" />

    <!-- ═══════════════════════════════════════════════════════════
     ██ SECTION MÉDECIN
═══════════════════════════════════════════════════════════ -->

    <!-- Acteur Médecin cx=70, cy=1110 -->
    <ellipse cx="70" cy="1090" rx="20" ry="20" fill="none" stroke="#ca8a04" stroke-width="2" />
    <line x1="70" y1="1110" x2="70" y2="1150" stroke="#ca8a04" stroke-width="2" />
    <line x1="46" y1="1128" x2="94" y2="1128" stroke="#ca8a04" stroke-width="2" />
    <line x1="70" y1="1150" x2="50" y2="1175" stroke="#ca8a04" stroke-width="2" />
    <line x1="70" y1="1150" x2="90" y2="1175" stroke="#ca8a04" stroke-width="2" />
    <text x="70" y="1193" text-anchor="middle" font-size="13" font-weight="500" fill="#ca8a04">Médecin</text>

    <!-- Se connecter Médecin  cx=265, cy=1110 -->
    <ellipse cx="265" cy="1110" rx="105" ry="26" fill="#f1f5f9" stroke="#475569" stroke-width="1.5" />
    <text x="265" y="1115" text-anchor="middle" font-size="11" fill="#1e293b">S'inscrire / Se connecter</text>

    <!-- Ligne acteur → se connecter -->
    <line x1="90" y1="1105" x2="160" y2="1110" stroke="#ca8a04" stroke-width="1.2" />

    <!-- CAS MÉDECIN  cx=530, cy= 860..1360 pas=100 -->
    <!-- M1 -->
    <ellipse cx="530" cy="860" rx="130" ry="26" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" />
    <text x="530" y="865" text-anchor="middle" font-size="12" fill="#713f12">Gérer ses disponibilités</text>
    <!-- M2 -->
    <ellipse cx="530" cy="960" rx="130" ry="26" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" />
    <text x="530" y="965" text-anchor="middle" font-size="12" fill="#713f12">Valider / Refuser un RDV</text>
    <!-- M3 -->
    <ellipse cx="530" cy="1060" rx="130" ry="26" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" />
    <text x="530" y="1065" text-anchor="middle" font-size="12" fill="#713f12">Démarrer consultation vidéo</text>
    <!-- M4 -->
    <ellipse cx="530" cy="1160" rx="130" ry="26" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" />
    <text x="530" y="1165" text-anchor="middle" font-size="12" fill="#713f12">Rédiger une ordonnance</text>
    <!-- M5 -->
    <ellipse cx="530" cy="1260" rx="130" ry="26" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" />
    <text x="530" y="1265" text-anchor="middle" font-size="12" fill="#713f12">Consulter dossier patient</text>
    <!-- M6 -->
    <ellipse cx="530" cy="1360" rx="130" ry="26" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" />
    <text x="530" y="1365" text-anchor="middle" font-size="12" fill="#713f12">Envoyer rappel / notification</text>

    <!-- include: Se connecter → chaque cas médecin -->
    <line x1="370" y1="1102" x2="400" y2="860" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="1106" x2="400" y2="960" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="1110" x2="400" y2="1060" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="1114" x2="400" y2="1160" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="1118" x2="400" y2="1260" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <line x1="370" y1="1122" x2="400" y2="1360" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <text x="378" y="1030" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

    <!-- SOUS-CAS MÉDECIN  cx=840 -->
    <!-- Sous M1a : Ajouter créneau cy=830 -->
    <ellipse cx="840" cy="830" rx="108" ry="22" fill="#fefce8" stroke="#fde047" stroke-width="1.2" />
    <text x="840" y="835" text-anchor="middle" font-size="11" fill="#713f12">Ajouter un créneau</text>
    <!-- Sous M1b : Bloquer créneau cy=890 -->
    <ellipse cx="840" cy="890" rx="108" ry="22" fill="#fefce8" stroke="#fde047" stroke-width="1.2" />
    <text x="840" y="895" text-anchor="middle" font-size="11" fill="#713f12">Bloquer un créneau</text>
    <!-- Sous M4 : Générer lien cy=1060 -->
    <ellipse cx="840" cy="1060" rx="108" ry="22" fill="#fefce8" stroke="#fde047" stroke-width="1.2" />
    <text x="840" y="1065" text-anchor="middle" font-size="11" fill="#713f12">Générer lien de consultation</text>

    <!-- include: Gérer dispo → sous-cas -->
    <line x1="660" y1="852" x2="732" y2="836" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <text x="672" y="846" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>
    <line x1="660" y1="868" x2="732" y2="888" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />

    <!-- include: Démarrer consult → générer lien -->
    <line x1="660" y1="1060" x2="732" y2="1060" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <text x="672" y="1054" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

    <!-- include: Démarrer consult → Valider RDV -->
    <line x1="530" y1="1034" x2="530" y2="986" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <text x="534" y="1014" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

    <!-- include: Rédiger ordonnance → Consulter dossier patient -->
    <line x1="530" y1="1186" x2="530" y2="1234" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <text x="534" y="1214" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

    <!-- include: Démarrer consult (médecin) → Rejoindre (patient) — lien inter-section -->
    <path d="M400,1060 L175,1060 L175,500 L400,500" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" fill="none"
      marker-end="url(#arrBlue)" />
    <text x="155" y="785" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif"
      transform="rotate(-90,155,785)">«include»</text>

    <!-- extend: Valider RDV → Envoyer notif (M6) -->
    <line x1="660" y1="960" x2="660" y2="1360" stroke="#888" stroke-width="1" stroke-dasharray="5,3"
      marker-end="url(#arrBlue)" />
    <path d="M660,960 L700,960 L700,1360 L660,1360" stroke="#888" stroke-width="1" stroke-dasharray="5,3" fill="none"
      marker-end="url(#arrGray)" />
    <text x="703" y="1160" font-size="9" fill="#888" font-family="'DM Mono',sans-serif">«extend»</text>

    <!-- ═══════════════════════════════════════════════════════════
     ACTEUR SYSTÈME NOTIFICATIONS
═══════════════════════════════════════════════════════════ -->
    <rect x="960" y="1340" width="110" height="52" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" />
    <text x="1015" y="1361" text-anchor="middle" font-size="11" font-weight="500" fill="#3b0764">«système»</text>
    <text x="1015" y="1379" text-anchor="middle" font-size="11" font-weight="500" fill="#3b0764">Notifications</text>
    <line x1="960" y1="1363" x2="660" y2="1363" stroke="#7c3aed" stroke-width="1.2" />

  </svg>

  <div class="legend">
    <div class="legend-item">
      <div class="leg-line leg-solid"></div> Association acteur ↔ cas
    </div>
    <div class="legend-item">
      <div class="leg-line leg-dash"></div> «include» — cas obligatoirement inclus
    </div>
    <div class="legend-item">
      <div class="leg-line leg-dash-gray"></div> «extend» — cas optionnel déclenché
    </div>
    <div class="legend-item" style="font-family:'DM Sans',sans-serif; color:#3b0764">▭ Acteur secondaire (système
      externe)</div>
  </div>

</body>

</html>
