<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GooDoc — Diagramme de Cas d'Utilisation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f9f7f4;
    font-family: 'DM Sans', sans-serif;
    padding: 32px;
  }
  header {
    margin-bottom: 28px;
    border-bottom: 2px solid #1a1a1a;
    padding-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #1a1a1a;
    max-width: 500px;
    line-height: 1.25;
  }
  header .meta {
    font-size: 10px;
    font-weight: 500;
    color: #6b6b6b;
    letter-spacing: .1em;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.9;
  }

  svg text { font-family: 'DM Sans', sans-serif; }

  /* ── LEGEND ── */
  .legend {
    margin-top: 24px;
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    padding: 14px 20px;
    background: #fff;
    border: 1px solid #e2e2e2;
    border-radius: 10px;
    font-size: 11px;
    color: #444;
    font-family: 'DM Mono', monospace;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .leg-line { width: 32px; height: 2px; }
  .leg-solid { background: #555; }
  .leg-dash { background: repeating-linear-gradient(90deg, #2563eb 0, #2563eb 5px, transparent 5px, transparent 8px); height: 1.5px; }
  .leg-dash-gray { background: repeating-linear-gradient(90deg, #888 0, #888 4px, transparent 4px, transparent 7px); height: 1.5px; }
</style>
</head>
<body>

<header>
  <h1>GooDoc — Diagramme de cas d'utilisation</h1>
  <div class="meta">UML 2.x · Version corrigée<br>Licence Informatique · Institut Galilée</div>
</header>


<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrGray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- ══ SYSTÈME BORDER ══ -->
  <rect x="200" y="30" width="820" height="840" rx="12"
        fill="white" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="610" y="58" text-anchor="middle" font-size="14" font-weight="500"
        fill="#475569" font-family="'DM Sans',sans-serif">GooDoc — Système de Gestion de RDV Médicaux</text>

  <!-- ══ ACTEUR : PATIENT ══ -->
  <g>
    <ellipse cx="80" cy="180" rx="20" ry="20" fill="none" stroke="#16a34a" stroke-width="2"/>
    <line x1="80" y1="200" x2="80" y2="244" stroke="#16a34a" stroke-width="2"/>
    <line x1="55"  y1="218" x2="105" y2="218" stroke="#16a34a" stroke-width="2"/>
    <line x1="80" y1="244" x2="58"  y2="270" stroke="#16a34a" stroke-width="2"/>
    <line x1="80" y1="244" x2="102" y2="270" stroke="#16a34a" stroke-width="2"/>
    <text x="80" y="288" text-anchor="middle" font-size="13" font-weight="500"
          fill="#16a34a" font-family="'DM Sans',sans-serif">Patient</text>
  </g>

  <!-- ══ ACTEUR : MÉDECIN ══ -->
  <g>
    <ellipse cx="80" cy="600" rx="20" ry="20" fill="none" stroke="#ca8a04" stroke-width="2"/>
    <line x1="80" y1="620" x2="80" y2="664" stroke="#ca8a04" stroke-width="2"/>
    <line x1="55"  y1="638" x2="105" y2="638" stroke="#ca8a04" stroke-width="2"/>
    <line x1="80" y1="664" x2="58"  y2="690" stroke="#ca8a04" stroke-width="2"/>
    <line x1="80" y1="664" x2="102" y2="690" stroke="#ca8a04" stroke-width="2"/>
    <text x="80" y="708" text-anchor="middle" font-size="13" font-weight="500"
          fill="#ca8a04" font-family="'DM Sans',sans-serif">Médecin</text>
  </g>

  <!-- ══ ACTEUR SYSTÈME : NOTIF (rectangle = acteur secondaire) ══ -->
  <rect x="1080" y="380" width="100" height="50" rx="6"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="1130" y="400" text-anchor="middle" font-size="11" font-weight="500"
        fill="#3b0764" font-family="'DM Sans',sans-serif">«système»</text>
  <text x="1130" y="418" text-anchor="middle" font-size="11" font-weight="500"
        fill="#3b0764" font-family="'DM Sans',sans-serif">Notifications</text>

  <!-- ══════════════════════════════════════
       CAS D'UTILISATION COMMUNS
  ══════════════════════════════════════ -->
  <ellipse cx="530" cy="90" rx="130" ry="24" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="530" y="95" text-anchor="middle" font-size="12" fill="#1e293b" font-family="'DM Sans',sans-serif">S'inscrire / Se connecter</text>
  <!-- includes vers Se connecter depuis tous les cas patient -->
  <line x1="390" y1="171" x2="450" y2="114" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <line x1="390" y1="321" x2="470" y2="114" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <line x1="390" y1="396" x2="480" y2="114" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <line x1="390" y1="536" x2="490" y2="114" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <!-- label unique centré -->
  <text x="370" y="148" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <!-- includes vers Se connecter depuis tous les cas médecin -->
  <line x1="730" y1="171" x2="600" y2="114" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <line x1="730" y1="321" x2="610" y2="114" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <line x1="730" y1="396" x2="615" y2="114" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <line x1="730" y1="471" x2="620" y2="114" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <line x1="730" y1="546" x2="625" y2="114" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="700" y="148" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <!-- ══════════════════════════════════════
       CAS PATIENT
  ══════════════════════════════════════ -->

  <!-- 1. Prendre un RDV -->
  <ellipse cx="390" cy="195" rx="115" ry="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="390" y="200" text-anchor="middle" font-size="12" fill="#14532d" font-family="'DM Sans',sans-serif">Prendre un rendez-vous</text>

  <!-- Sous-cas de "Prendre un RDV" (include) -->
  <ellipse cx="290" cy="275" rx="95" ry="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="290" y="280" text-anchor="middle" font-size="11" fill="#166534" font-family="'DM Sans',sans-serif">Choisir un médecin</text>

  <ellipse cx="420" cy="275" rx="95" ry="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="420" y="280" text-anchor="middle" font-size="11" fill="#166534" font-family="'DM Sans',sans-serif">Choisir un créneau</text>

  <ellipse cx="545" cy="275" rx="95" ry="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="545" y="280" text-anchor="middle" font-size="11" fill="#166534" font-family="'DM Sans',sans-serif">Confirmer le RDV</text>

  <!-- include arrows: Prendre RDV -> sous-cas -->
  <line x1="340" y1="210" x2="300" y2="255" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="298" y="236" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <line x1="390" y1="219" x2="420" y2="255" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="416" y="240" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <line x1="420" y1="212" x2="528" y2="256" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="480" y="230" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <!-- 2. Annuler un RDV -->
  <ellipse cx="390" cy="345" rx="115" ry="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="390" y="350" text-anchor="middle" font-size="12" fill="#14532d" font-family="'DM Sans',sans-serif">Annuler un rendez-vous</text>

  <!-- extend: annuler -> notif (chemin en L pour éviter de couper le diagramme) -->
  <path d="M505,345 L870,345 L870,740 L740,740" stroke="#888" stroke-width="1" stroke-dasharray="5,3" fill="none" marker-end="url(#arrGray)"/>
  <text x="660" y="338" font-size="9" fill="#888" font-family="'DM Mono',sans-serif">«extend»</text>

  <!-- 3. Consulter dossier médical -->
  <ellipse cx="390" cy="420" rx="115" ry="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="390" y="425" text-anchor="middle" font-size="12" fill="#14532d" font-family="'DM Sans',sans-serif">Consulter son dossier médical</text>

  <!-- include -> voir ordonnances, voir historique -->
  <ellipse cx="300" cy="495" rx="95" ry="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="300" y="500" text-anchor="middle" font-size="11" fill="#166534" font-family="'DM Sans',sans-serif">Voir ses ordonnances</text>

  <ellipse cx="460" cy="495" rx="95" ry="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="460" y="500" text-anchor="middle" font-size="11" fill="#166534" font-family="'DM Sans',sans-serif">Voir l'historique</text>

  <line x1="355" y1="436" x2="310" y2="475" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="300" y="460" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <line x1="420" y1="436" x2="452" y2="475" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="438" y="460" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <!-- 4. Rejoindre consultation vidéo -->
  <ellipse cx="390" cy="560" rx="115" ry="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="390" y="565" text-anchor="middle" font-size="12" fill="#14532d" font-family="'DM Sans',sans-serif">Rejoindre consultation vidéo</text>

  <!-- ══════════════════════════════════════
       CAS MÉDECIN
  ══════════════════════════════════════ -->

  <!-- 1. Gérer disponibilités -->
  <ellipse cx="730" cy="195" rx="115" ry="24" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="730" y="200" text-anchor="middle" font-size="12" fill="#713f12" font-family="'DM Sans',sans-serif">Gérer ses disponibilités</text>

  <!-- sous-cas -->
  <ellipse cx="660" cy="270" rx="90" ry="20" fill="#fefce8" stroke="#fde047" stroke-width="1.2"/>
  <text x="660" y="275" text-anchor="middle" font-size="11" fill="#713f12" font-family="'DM Sans',sans-serif">Ajouter un créneau</text>

  <ellipse cx="810" cy="270" rx="90" ry="20" fill="#fefce8" stroke="#fde047" stroke-width="1.2"/>
  <text x="810" y="275" text-anchor="middle" font-size="11" fill="#713f12" font-family="'DM Sans',sans-serif">Bloquer un créneau</text>

  <line x1="700" y1="210" x2="668" y2="250" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="648" y="234" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <line x1="756" y1="210" x2="802" y2="250" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="776" y="234" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <!-- 2. Valider / refuser RDV -->
  <ellipse cx="730" cy="345" rx="115" ry="24" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="730" y="350" text-anchor="middle" font-size="12" fill="#713f12" font-family="'DM Sans',sans-serif">Valider / Refuser un RDV</text>

  <!-- 3. Démarrer consultation vidéo -->
  <ellipse cx="730" cy="420" rx="115" ry="24" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="730" y="425" text-anchor="middle" font-size="12" fill="#713f12" font-family="'DM Sans',sans-serif">Démarrer consultation vidéo</text>

  <!-- include: démarrer -> rejoindre (lien entre patient et médecin) -->
  <line x1="615" y1="420" x2="505" y2="420" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="540" y="413" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <!-- include: démarrer -> Valider RDV -->
  <line x1="730" y1="396" x2="730" y2="369" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="734" y="386" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <!-- 4. Rédiger ordonnance -->
  <ellipse cx="730" cy="495" rx="115" ry="24" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="730" y="500" text-anchor="middle" font-size="12" fill="#713f12" font-family="'DM Sans',sans-serif">Rédiger une ordonnance</text>

  <!-- include: rédiger -> consulter dossier patient -->
  <ellipse cx="730" cy="570" rx="115" ry="24" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="730" y="575" text-anchor="middle" font-size="12" fill="#713f12" font-family="'DM Sans',sans-serif">Consulter dossier patient</text>

  <line x1="730" y1="519" x2="730" y2="546" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="734" y="536" font-size="9" fill="#2563eb" font-family="'DM Mono',sans-serif">«include»</text>

  <!-- ══════════════════════════════════════
       CAS NOTIFICATIONS (acteur secondaire)
  ══════════════════════════════════════ -->
  <ellipse cx="610" cy="740" rx="130" ry="24" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="610" y="745" text-anchor="middle" font-size="12" fill="#3b0764" font-family="'DM Sans',sans-serif">Envoyer rappel / notification</text>

  <ellipse cx="610" cy="810" rx="130" ry="24" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="610" y="815" text-anchor="middle" font-size="12" fill="#3b0764" font-family="'DM Sans',sans-serif">Générer lien de consultation</text>

  <!-- acteur système -> cas notifs -->
  <line x1="1080" y1="405" x2="740" y2="745" stroke="#7c3aed" stroke-width="1.2"/>
  <line x1="1080" y1="420" x2="740" y2="812" stroke="#7c3aed" stroke-width="1.2"/>

  <!-- extend: confirmer RDV -> notif -->
  <line x1="545" y1="295" x2="560" y2="716" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrGray)"/>
  <text x="568" y="500" font-size="9" fill="#888" font-family="'DM Mono',sans-serif">«extend»</text>

  <!-- extend: valider RDV -> notif -->
  <line x1="730" y1="369" x2="680" y2="716" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrGray)"/>

  <!-- extend: démarrer consultation -> générer lien -->
  <line x1="730" y1="444" x2="680" y2="786" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrGray)"/>
  <text x="715" y="640" font-size="9" fill="#888" font-family="'DM Mono',sans-serif">«extend»</text>

  <!-- ══════════════════════════════════════
       ASSOCIATIONS ACTEUR → CAS
  ══════════════════════════════════════ -->
  <!-- Patient -->
  <line x1="100" y1="175" x2="275" y2="195" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="100" y1="185" x2="275" y2="345" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="100" y1="195" x2="275" y2="420" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="100" y1="205" x2="275" y2="560" stroke="#16a34a" stroke-width="1.2"/>

  <!-- Médecin -->
  <line x1="100" y1="595" x2="615" y2="195" stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="100" y1="605" x2="615" y2="345" stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="100" y1="615" x2="615" y2="420" stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="100" y1="625" x2="615" y2="495" stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="100" y1="635" x2="615" y2="570" stroke="#ca8a04" stroke-width="1.2"/>

</svg>

<div class="legend">
  <div class="legend-item"><div class="leg-line leg-solid"></div> Association acteur ↔ cas</div>
  <div class="legend-item"><div class="leg-line leg-dash"></div> «include» — cas obligatoirement inclus</div>
  <div class="legend-item"><div class="leg-line leg-dash-gray"></div> «extend» — cas optionnel déclenché</div>
  <div class="legend-item" style="font-family:'DM Sans',sans-serif; color:#3b0764">▭ Acteur secondaire (système externe)</div>
</div>

</body>
</html>
