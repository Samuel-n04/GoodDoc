<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diagramme d'Activité — Prise de RDV</title>
<style>
  body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
  h1 { text-align:center; color:#2c3e50; margin-bottom:4px; }
  h3 { text-align:center; color:#64748b; margin-top:0; font-weight:normal; }
</style>
</head>
<body>
<h1>Diagramme d'Activité</h1>
<h3>Flux : Prise de rendez-vous et consultation médicale en ligne</h3>
<svg viewBox="0 0 980 1020" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Swim lanes -->
  <!-- Lane Patient -->
  <rect x="20" y="20" width="290" height="980" rx="0" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="165" y="50" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="Segoe UI">Patient</text>

  <!-- Lane Système -->
  <rect x="310" y="20" width="360" height="980" rx="0" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="490" y="50" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569" font-family="Segoe UI">Système</text>

  <!-- Lane Médecin -->
  <rect x="670" y="20" width="290" height="980" rx="0" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
  <text x="815" y="50" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309" font-family="Segoe UI">Médecin</text>

  <!-- Initial node -->
  <circle cx="490" cy="80" r="13" fill="#334155"/>
  <line x1="490" y1="93" x2="490" y2="115" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- A1: Se connecter -->
  <rect x="370" y="118" width="240" height="40" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="490" y="143" text-anchor="middle" font-size="12" fill="#1e3a5f" font-family="Segoe UI">Se connecter au système</text>
  <line x1="490" y1="158" x2="490" y2="182" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- A2: Rechercher médecin (Patient) -->
  <rect x="55" y="185" width="210" height="40" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="210" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Rechercher un médecin</text>
  <!-- Join from Système to Patient -->
  <line x1="370" y1="182" x2="265" y2="205" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="265" y1="205" x2="265" y2="205" stroke="#334155" stroke-width="2"/>

  <!-- A3: Afficher créneaux (Système) -->
  <rect x="370" y="185" width="240" height="40" rx="20" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="490" y="210" text-anchor="middle" font-size="12" fill="#1e293b" font-family="Segoe UI">Afficher les créneaux dispo</text>

  <line x1="160" y1="225" x2="160" y2="250" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="490" y1="225" x2="490" y2="250" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- A4: Choisir créneau (Patient) -->
  <rect x="55" y="253" width="210" height="40" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="278" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Choisir un créneau</text>
  <line x1="160" y1="293" x2="160" y2="320" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- A5: Confirmer RDV (Patient) -->
  <rect x="55" y="323" width="210" height="40" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="348" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Confirmer la demande de RDV</text>
  <line x1="265" y1="343" x2="370" y2="343" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- A6: Enregistrer RDV (Système) -->
  <rect x="370" y="323" width="240" height="40" rx="20" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="490" y="348" text-anchor="middle" font-size="12" fill="#1e293b" font-family="Segoe UI">Enregistrer RDV (statut: EN_ATTENTE)</text>
  <line x1="490" y1="363" x2="490" y2="390" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- A7: Notifier médecin (Système) -->
  <rect x="370" y="393" width="240" height="40" rx="20" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="490" y="418" text-anchor="middle" font-size="12" fill="#1e293b" font-family="Segoe UI">Notifier le médecin</text>
  <line x1="610" y1="413" x2="700" y2="413" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="490" y1="433" x2="490" y2="455" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision: médecin accepte? -->
  <!-- Diamond -->
  <polygon points="815,455 865,483 815,510 765,483" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="815" y="479" text-anchor="middle" font-size="11" fill="#713f12" font-family="Segoe UI">Accepter</text>
  <text x="815" y="494" text-anchor="middle" font-size="11" fill="#713f12" font-family="Segoe UI">le RDV ?</text>

  <!-- Médecin reçoit notification -->
  <rect x="700" y="393" width="230" height="40" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="815" y="418" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Consulter la demande</text>
  <line x1="815" y1="433" x2="815" y2="455" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Oui -->
  <line x1="865" y1="483" x2="950" y2="483" stroke="#334155" stroke-width="2"/>
  <line x1="950" y1="483" x2="950" y2="540" stroke="#334155" stroke-width="2"/>
  <line x1="950" y1="540" x2="700" y2="540" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="905" y="476" font-size="11" fill="#059669" font-family="Segoe UI">Oui</text>

  <!-- Non -->
  <line x1="765" y1="483" x2="680" y2="483" stroke="#334155" stroke-width="2"/>
  <line x1="680" y1="483" x2="680" y2="540" stroke="#334155" stroke-width="2"/>
  <line x1="680" y1="540" x2="610" y2="540" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="700" y="476" font-size="11" fill="#dc2626" font-family="Segoe UI">Non</text>

  <!-- Refus (Système) -->
  <rect x="370" y="520" width="240" height="40" rx="20" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="490" y="545" text-anchor="middle" font-size="12" fill="#7f1d1d" font-family="Segoe UI">Annuler RDV + notifier patient</text>

  <!-- Accepté : Confirmer RDV (Médecin) -->
  <rect x="700" y="520" width="230" height="40" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="815" y="545" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Valider le rendez-vous</text>
  <line x1="700" y1="540" x2="610" y2="540" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Système génère lien -->
  <rect x="370" y="520" width="240" height="40" rx="20" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <!-- overwrite with the correct one for the "oui" path -->

  <!-- Système : générer lien consultation -->
  <line x1="490" y1="560" x2="490" y2="590" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="370" y="593" width="240" height="40" rx="20" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="490" y="618" text-anchor="middle" font-size="12" fill="#064e3b" font-family="Segoe UI">Générer lien Jitsi + notifier patient</text>

  <!-- Patient rejoint -->
  <line x1="370" y1="613" x2="265" y2="645" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="55" y="648" width="210" height="40" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="673" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Rejoindre la consultation</text>

  <!-- Médecin démarre -->
  <line x1="490" y1="633" x2="490" y2="660" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="610" y1="613" x2="700" y2="645" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="700" y="648" width="230" height="40" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="815" y="673" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Démarrer la consultation</text>

  <!-- Consultation en cours -->
  <rect x="370" y="663" width="240" height="40" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="490" y="688" text-anchor="middle" font-size="12" fill="#1e3a5f" font-family="Segoe UI">Consultation vidéo en cours</text>

  <line x1="265" y1="688" x2="370" y2="688" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="688" x2="610" y2="688" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="490" y1="703" x2="490" y2="730" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Médecin rédige ordonnance -->
  <rect x="700" y="733" width="230" height="40" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="815" y="758" text-anchor="middle" font-size="12" fill="#713f12" font-family="Segoe UI">Rédiger ordonnance</text>
  <line x1="815" y1="703" x2="815" y2="733" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="753" x2="610" y2="753" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Système enregistre -->
  <rect x="370" y="733" width="240" height="40" rx="20" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="490" y="758" text-anchor="middle" font-size="12" fill="#1e293b" font-family="Segoe UI">Enregistrer ordonnance + MAJ dossier</text>

  <line x1="490" y1="773" x2="490" y2="800" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Patient consulte ordonnance -->
  <rect x="55" y="803" width="210" height="40" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="828" text-anchor="middle" font-size="12" fill="#14532d" font-family="Segoe UI">Télécharger l'ordonnance PDF</text>
  <line x1="370" y1="820" x2="265" y2="823" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Final -->
  <line x1="490" y1="800" x2="490" y2="868" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="490" cy="884" r="14" fill="none" stroke="#334155" stroke-width="2.5"/>
  <circle cx="490" cy="884" r="9" fill="#334155"/>
</svg>
</body>
</html>
