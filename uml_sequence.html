<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diagramme de Séquence — Prise de RDV</title>
<style>
  body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
  h1 { text-align:center; color:#2c3e50; margin-bottom:4px; }
  h3 { text-align:center; color:#64748b; margin-top:0; font-weight:normal; }
</style>
</head>
<body>
<h1>Diagramme de Séquence</h1>
<h3>Scénario : Prise de rendez-vous et consultation vidéo</h3>
<svg viewBox="0 0 1050 820" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrRet" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrSys" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Lifeline headers -->
  <!-- Patient -->
  <rect x="30" y="20" width="110" height="45" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="85" y="47" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d" font-family="Segoe UI">Patient</text>

  <!-- Frontend -->
  <rect x="200" y="20" width="110" height="45" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="255" y="47" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f" font-family="Segoe UI">Frontend</text>

  <!-- Backend -->
  <rect x="390" y="20" width="110" height="45" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="445" y="47" text-anchor="middle" font-size="13" font-weight="bold" fill="#713f12" font-family="Segoe UI">Backend API</text>

  <!-- BDD -->
  <rect x="580" y="20" width="110" height="45" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="635" y="47" text-anchor="middle" font-size="13" font-weight="bold" fill="#831843" font-family="Segoe UI">Base de données</text>

  <!-- Notif -->
  <rect x="770" y="20" width="110" height="45" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="825" y="47" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b0764" font-family="Segoe UI">Service Notif.</text>

  <!-- Médecin -->
  <rect x="940" y="20" width="90" height="45" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="985" y="47" text-anchor="middle" font-size="13" font-weight="bold" fill="#713f12" font-family="Segoe UI">Médecin</text>

  <!-- Lifelines -->
  <line x1="85" y1="65" x2="85" y2="800" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="255" y1="65" x2="255" y2="800" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="445" y1="65" x2="445" y2="800" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="635" y1="65" x2="635" y2="800" stroke="#db2777" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="825" y1="65" x2="825" y2="800" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="985" y1="65" x2="985" y2="800" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Activation boxes -->
  <rect x="80" y="100" width="10" height="620" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <rect x="250" y="120" width="10" height="580" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <rect x="440" y="140" width="10" height="540" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>
  <rect x="630" y="160" width="10" height="200" fill="#fbcfe8" stroke="#db2777" stroke-width="1"/>
  <rect x="820" y="280" width="10" height="80" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <rect x="980" y="350" width="10" height="320" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>

  <!-- === MESSAGES === -->
  <!-- 1 -->
  <line x1="90" y1="115" x2="250" y2="115" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="165" y="110" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">1. Rechercher médecin(spécialité)</text>

  <!-- 2 -->
  <line x1="255" y1="140" x2="445" y2="140" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="345" y="135" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">2. GET /médecins?spécialité=...</text>

  <!-- 3 -->
  <line x1="445" y1="165" x2="635" y2="165" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="535" y="160" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">3. SELECT médecins</text>

  <!-- 4 retour -->
  <line x1="635" y1="190" x2="445" y2="190" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRet)"/>
  <text x="535" y="185" text-anchor="middle" font-size="11" fill="#64748b" font-family="Segoe UI">4. liste médecins</text>

  <!-- 5 retour -->
  <line x1="445" y1="215" x2="255" y2="215" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRet)"/>
  <text x="345" y="210" text-anchor="middle" font-size="11" fill="#64748b" font-family="Segoe UI">5. afficher résultats</text>

  <!-- 6 -->
  <line x1="90" y1="245" x2="250" y2="245" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="165" y="240" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">6. Choisir créneau</text>

  <!-- 7 -->
  <line x1="255" y1="270" x2="445" y2="270" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="345" y="265" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">7. POST /rendezvous</text>

  <!-- 8 -->
  <line x1="445" y1="295" x2="635" y2="295" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="535" y="290" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">8. INSERT RendezVous</text>

  <!-- 9 retour -->
  <line x1="635" y1="320" x2="445" y2="320" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRet)"/>
  <text x="535" y="315" text-anchor="middle" font-size="11" fill="#64748b" font-family="Segoe UI">9. rdv_id, statut=EN_ATTENTE</text>

  <!-- 10 notif medecin -->
  <line x1="445" y1="345" x2="825" y2="345" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrSys)"/>
  <text x="630" y="340" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="Segoe UI">10. notifier médecin (email/SMS)</text>

  <!-- 11 medecin reçoit -->
  <line x1="825" y1="360" x2="985" y2="360" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrSys)"/>
  <text x="900" y="355" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="Segoe UI">11. notification</text>

  <!-- 12 medecin valide -->
  <line x1="985" y1="390" x2="445" y2="390" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="715" y="385" text-anchor="middle" font-size="11" fill="#ca8a04" font-family="Segoe UI">12. PUT /rendezvous/{id}/valider</text>

  <!-- 13 -->
  <line x1="445" y1="415" x2="635" y2="415" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="535" y="410" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">13. UPDATE statut=CONFIRME</text>

  <!-- 14 lien consult -->
  <line x1="445" y1="440" x2="635" y2="440" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="535" y="435" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">14. INSERT ConsultationVideo</text>

  <!-- 15 notif patient -->
  <line x1="445" y1="465" x2="825" y2="465" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrSys)"/>
  <text x="630" y="460" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="Segoe UI">15. notifier patient (lien + confirmation)</text>

  <!-- 16 patient rejoint -->
  <line x1="85" y1="510" x2="250" y2="510" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="165" y="505" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">16. Rejoindre consultation</text>

  <!-- 17 -->
  <line x1="255" y1="535" x2="445" y2="535" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="345" y="530" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">17. GET /consultation/{id}/lien</text>

  <!-- 18 retour lien -->
  <line x1="445" y1="560" x2="255" y2="560" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRet)"/>
  <text x="345" y="555" text-anchor="middle" font-size="11" fill="#64748b" font-family="Segoe UI">18. lien Jitsi</text>

  <!-- 19 WebRTC -->
  <line x1="255" y1="590" x2="985" y2="590" stroke="#059669" stroke-width="2" stroke-dasharray="8,3"/>
  <text x="620" y="585" text-anchor="middle" font-size="11" fill="#059669" font-family="Segoe UI" font-weight="bold">19. Session WebRTC / Jitsi (peer-to-peer)</text>

  <!-- 20 fin consult -->
  <line x1="985" y1="630" x2="445" y2="630" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="715" y="625" text-anchor="middle" font-size="11" fill="#ca8a04" font-family="Segoe UI">20. POST /consultation/{id}/terminer</text>

  <!-- 21 ordonnance -->
  <line x1="985" y1="660" x2="445" y2="660" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="715" y="655" text-anchor="middle" font-size="11" fill="#ca8a04" font-family="Segoe UI">21. POST /ordonnances</text>

  <!-- 22 -->
  <line x1="445" y1="685" x2="635" y2="685" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="535" y="680" text-anchor="middle" font-size="11" fill="#2563eb" font-family="Segoe UI">22. INSERT Ordonnance</text>

  <!-- 23 confirmation -->
  <line x1="445" y1="715" x2="255" y2="715" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRet)"/>
  <text x="345" y="710" text-anchor="middle" font-size="11" fill="#64748b" font-family="Segoe UI">23. ordonnance PDF disponible</text>

  <!-- Frame label -->
  <rect x="15" y="82" width="1020" height="700" rx="5" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="15" y="82" width="155" height="22" rx="3" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="92" y="97" text-anchor="middle" font-size="11" fill="#475569" font-family="Segoe UI">sd PriseRDV + Consultation</text>
</svg>
</body>
</html>
